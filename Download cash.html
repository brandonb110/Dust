<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Calculator</title>
<style>
body{background:#1c1e21;color:#fff;font-family:Arial;padding:20px}
.container{max-width:900px;margin:auto;background:#242526;padding:20px;border-radius:12px}
h1{text-align:center;color:#00bfff}
input,button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;font-size:16px}
button{background:#00bfff;color:#fff;font-weight:bold}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{border:1px solid #444;padding:10px;text-align:center}
th{background:#333}
</style>
</head>
<body>
<div class="container">
<h1>Cash Game Calculator</h1>
<input placeholder="Paste RANDOM.ORG verify link">
<input type="number" value="10" placeholder="$ Per Win">
<input type="number" value="25" placeholder="Entry Fee">
<button>Generate Results</button>

<table>
<thead>
<tr>
<th>Player</th>
<th>Wins</th>
<th>Gross</th>
<th>Entry Paid</th>
<th>Net</th>
</tr>
</thead>
<tbody>
<tr>
<td>Player 1</td>
<td>5</td>
<td>$50</td>
<td>$25</td>
<td>$25</td>
</tr>
</tbody>
</table>
</div>
</body>
</html>
