<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TenTopper Calculator</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,Helvetica,sans-serif}
header{background:#111827;padding:12px;text-align:center;border-bottom:1px solid #374151}
h1{margin:0;color:#60a5fa;font-size:28px}
nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
nav a{color:white;background:#1f2937;border:1px solid #374151;border-radius:8px;padding:8px 12px;text-decoration:none;font-size:14px}
.wrap{max-width:1050px;margin:20px auto;padding:0 14px}
.card{background:#111827;border:1px solid #374151;border-radius:14px;padding:16px;margin-bottom:16px}
.compactCard{max-width:760px;margin:0 auto 16px auto}
label{display:block;margin-top:6px;font-weight:bold;font-size:13px}
input,button{width:100%;padding:9px;margin-top:5px;border-radius:8px;border:1px solid #374151;font-size:14px;box-sizing:border-box}
input{background:#020617;color:white}
button{background:#2563eb;color:white;font-weight:bold;border:0;cursor:pointer}
.copyBtn{background:#22c55e;color:#020617;margin-top:10px}
.grid{display:flex;gap:8px;align-items:flex-end}
.grid>div{flex:1;min-width:0}
.notice{color:#cbd5e1;font-size:14px;line-height:1.45}
.listBox{background:#020617;border:1px solid #374151;border-radius:10px;padding:10px;margin-top:10px}
.row{display:grid;grid-template-columns:42px 1fr;gap:8px;align-items:center;padding:8px 4px;border-bottom:1px solid #1f2937;font-size:15px}
.row:last-child{border-bottom:0}
.damageRow{display:grid;grid-template-columns:1fr 90px;gap:8px;align-items:center;padding:8px 4px;border-bottom:1px solid #1f2937;font-size:15px}
.damageRow:last-child{border-bottom:0}
.num{font-weight:bold;color:#60a5fa}
.amount{text-align:right;color:#ef4444;font-weight:bold}
@media(max-width:700px){.grid{flex-direction:column}.damageRow{grid-template-columns:1fr 75px;font-size:14px}.row{grid-template-columns:34px 1fr;font-size:14px}}
</style>
</head>
<body>

<header>
<h1>TenTopper Calculator</h1>
<nav>
<a href="/">DUST Jackpot</a>
<a href="/tentopper.html">TenTopper</a>
</nav>
</header>

<div class="wrap">

<div class="card compactCard">
<h2>RANDOM.ORG Import</h2>

<label>Verify Link</label>
<input id="verify" placeholder="https://giveaways.random.org/verify/xxxxx">

<div class="grid">
<div>
<label>Damage Cost Per Round</label>
<input id="cost" type="number" placeholder="Enter damage amount">
</div>
</div>

<button id="generateBtn" type="button">Generate TenTopper Results</button>

<p id="status" class="notice">Paste the RANDOM.ORG verify link, enter the cost, then generate.</p>
</div>

<div class="card">
<h2>Top Spot Each Round</h2>
<button class="copyBtn" id="copyTop" type="button">COPY TOP RESULTS</button>
<div class="listBox" id="topList">
<div class="row"><div class="num">#</div><div>No results yet</div></div>
</div>
</div>

<div class="card">
<h2>Spot 10 Damages</h2>
<button class="copyBtn" id="copyDamage" type="button">COPY DAMAGES</button>
<div class="listBox" id="damageList">
<div class="damageRow"><div class="num">#</div><div>No results yet</div><div class="amount">0</div></div>
</div>
</div>

</div>

<script>
let latestTopText = "";
let latestDamageText = "";

function fmtDamage(value){
  const num = Number(value || 0);

  return Number.isInteger(num)
    ? num.toString()
    : num.toFixed(2);
}

function cleanDisplayName(name){
  return String(name || "").replace(/^\s*\d+\s+/, "").trim();
}

async function generateTenTopper(){
  const url = document.getElementById("verify").value.trim();
  const cost = Number(document.getElementById("cost").value || 0);
  const status = document.getElementById("status");

  status.textContent = "Loading RANDOM.ORG verify page...";

  try{
    const res = await fetch("/api/tentopper?url=" + encodeURIComponent(url));
    const data = await res.json();

    if(!res.ok){
      status.textContent = data.error || "Could not import results.";
      return;
    }

    const topList = data.topResults || [];
    const damageList = data.damageResults || [];

    latestTopText =
      topList.map((x, index) => `${index + 1} ${cleanDisplayName(x.name)}`).join("\n");

    const damageTotals = {};

    damageList.forEach(x => {
      const name = cleanDisplayName(x.name);

      if(!damageTotals[name]){
        damageTotals[name] = 0;
      }

      damageTotals[name]++;
    });

    latestDamageText =
      Object.entries(damageTotals)
        .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .map(([name,count]) =>
          `${name} x${count} -${fmtDamage(count * cost)}`
        ).join("\n");

    document.getElementById("topList").innerHTML =
      topList.length
      ? topList.map((x, index) => `
        <div class="row">
          <div class="num">${index + 1}</div>
          <div>${cleanDisplayName(x.name)}</div>
        </div>
      `).join("")
      : '<div class="row"><div class="num">#</div><div>No results</div></div>';

    const damageTotalsDisplay = {};

    damageList.forEach(x => {
      const name = cleanDisplayName(x.name);

      if(!damageTotalsDisplay[name]){
        damageTotalsDisplay[name] = 0;
      }

      damageTotalsDisplay[name]++;
    });

    document.getElementById("damageList").innerHTML =
      Object.keys(damageTotalsDisplay).length
      ? Object.entries(damageTotalsDisplay)
          .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]))
          .map(([name,count]) => `
            <div class="damageRow">
              <div>${name} x${count}</div>
              <div></div>
              <div class="amount">-${fmtDamage(count * cost)}</div>
            </div>
          `).join("")
      : '<div class="damageRow"><div>No results</div><div></div><div class="amount">0</div></div>';

    status.textContent = "Imported " + data.roundCount + " rounds successfully.";

  }catch(e){
    status.textContent = "Import failed.";
  }
}

async function copyText(text, buttonId, original){
  if(!text){ return; }

  try{
    await navigator.clipboard.writeText(text);

    const btn = document.getElementById(buttonId);
    btn.textContent = "COPIED!";
    setTimeout(() => btn.textContent = original, 1500);
  }catch(e){
    alert("Copy failed. Try highlighting the list manually.");
  }
}

document.getElementById("generateBtn").addEventListener("click", generateTenTopper);
document.getElementById("copyTop").addEventListener("click", () => copyText(latestTopText, "copyTop", "COPY TOP RESULTS"));
document.getElementById("copyDamage").addEventListener("click", () => copyText(latestDamageText, "copyDamage", "COPY DAMAGES"));
</script>

</body>
</html>
