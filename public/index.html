<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUST Jackpot Calculator</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,Helvetica,sans-serif}
header{background:#111827;padding:12px;text-align:center;border-bottom:1px solid #374151}
h1{margin:0;color:#60a5fa;font-size:28px}
.wrap{max-width:1050px;margin:20px auto;padding:0 14px}
.card{background:#111827;border:1px solid #374151;border-radius:14px;padding:16px;margin-bottom:16px}
.compactCard{max-width:700px;margin:0 auto 16px auto}
label{display:block;margin-top:4px;font-weight:bold;font-size:12px}
input,button{width:100%;padding:8px;margin-top:4px;border-radius:7px;border:1px solid #374151;font-size:13px;box-sizing:border-box}
input{background:#020617;color:white}
button{background:#2563eb;color:white;font-weight:bold;border:0;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border-bottom:1px solid #374151;padding:10px;text-align:center}
th{background:#1f2937}
.good{color:#22c55e;font-weight:bold}
.bad{color:#ef4444;font-weight:bold}
.grid{display:flex;gap:8px;align-items:flex-end}
.grid>div{flex:1;min-width:0}
.notice{color:#cbd5e1;font-size:14px;line-height:1.45}
.netList{background:#020617;border:1px solid #374151;border-radius:10px;padding:10px;margin-top:10px}
.netRow{display:grid;grid-template-columns:42px 1fr 90px;gap:8px;align-items:center;padding:8px 4px;border-bottom:1px solid #1f2937;font-size:15px}
.netRow:last-child{border-bottom:0}
.netNum{font-weight:bold;color:#60a5fa}
.netAmount{text-align:right}
.copyButton{background:#22c55e;color:#020617;font-weight:900;font-size:15px;padding:12px;margin:10px 0 12px 0;border-radius:10px;width:100%}
</style>
</head>
<body>

<header>
<h1>DUST Jackpot Calculator</h1>
</header>

<div class="wrap">

<div class="card compactCard">
<h2>RANDOM.ORG Import</h2>

<label>Verify Link</label>
<input id="verify" placeholder="https://giveaways.random.org/verify/xxxxx">

<button id="pullBtn" type="button">Pull Results From Verify Link</button>

<p id="status" class="notice">Paste the RANDOM.ORG verify link and tap the button.</p>

<div class="grid">
<div>
<label>$ Per Win</label>
<input id="perwin" type="number" value="50">
</div>

<div>
<label>Entry Fee</label>
<input id="entry" type="number" value="150">
</div>

<div>
<label>Total Rounds</label>
<input id="rounds" type="number" value="27">
</div>
</div>
</div>

<div class="card">
<h2>Player Net List</h2>

<button id="copyBtn" type="button" class="copyButton">
COPY PLAYER NET LIST
</button>

<div class="netList" id="playerList"></div>
</div>

</div>

<script>
let importedRounds = [];
let initialSpots = {};

async function pullResults(){
  const url = document.getElementById("verify").value.trim();
  const status = document.getElementById("status");

  status.textContent = "Loading RANDOM.ORG verify page...";

  try{
    const res = await fetch("/api/verify?url=" + encodeURIComponent(url));
    const data = await res.json();

    if(!res.ok){
      status.textContent = data.error || "Could not import results.";
      return;
    }

    importedRounds = data.rounds || [];
    initialSpots = data.initialSpots || {};

    status.textContent = "Imported " + importedRounds.length + " rounds successfully.";

    buildPlayerNetList();

  }catch(e){
    status.textContent = "Import failed.";
  }
}

function getSpotRows(){

  const per = Number(document.getElementById("perwin").value || 0);
  const entry = Number(document.getElementById("entry").value || 0);

  const spotRows = [];

  for(let spot = 1; spot <= 10; spot++){

    const name = initialSpots[spot] || `#${spot}`;

    const wins =
      importedRounds.filter(r => Number(r.spot) === spot).length;

    const net = (wins * per) - entry;

    spotRows.push({
      spot: spot,
      name: name,
      wins: wins,
      net: net
    });
  }

  return spotRows.sort((a,b) => a.spot - b.spot);
}

function buildPlayerNetList(){

  const playerList = document.getElementById("playerList");
  const rows = getSpotRows();

  let html = "";

  rows.forEach(row => {

    html += `
    <div class="netRow">
      <div class="netNum">${row.spot}</div>
      <div>${row.name}</div>
      <div class="netAmount ${row.net >= 0 ? "good" : "bad"}">
        $${row.net.toFixed(2)}
      </div>
    </div>`;
  });

  playerList.innerHTML = html;
}

document.getElementById("copyBtn").addEventListener("click", async () => {

  const rows = getSpotRows();

  let text = "DUST Jackpot Results\n\n";

  rows.forEach(row => {
    text += `${row.spot}. ${row.name} - $${row.net.toFixed(2)}\n`;
  });

  try{
    await navigator.clipboard.writeText(text);

    const btn = document.getElementById("copyBtn");
    btn.textContent = "COPIED!";

    setTimeout(() => {
      btn.textContent = "COPY PLAYER NET LIST";
    }, 1500);

  }catch(e){
    alert("Copy failed.");
  }
});

document.getElementById("pullBtn").addEventListener("click", pullResults);
</script>

</body>
</html>
