<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Game Calculator</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,Helvetica,sans-serif}
header{background:#111827;padding:18px;text-align:center;border-bottom:1px solid #374151}
h1{margin:0;color:#60a5fa}
.wrap{max-width:1050px;margin:20px auto;padding:0 14px}
.card{background:#111827;border:1px solid #374151;border-radius:14px;padding:16px;margin-bottom:16px}
label{display:block;margin-top:12px;font-weight:bold}
input,textarea,button{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:1px solid #374151;font-size:16px;box-sizing:border-box}
input,textarea{background:#020617;color:white}
textarea{min-height:120px}
button{background:#2563eb;color:white;font-weight:bold;border:0;cursor:pointer}
button.secondary{background:#374151}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border-bottom:1px solid #374151;padding:10px;text-align:center}
th{background:#1f2937}
.good{color:#22c55e;font-weight:bold}.bad{color:#ef4444;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.notice{color:#cbd5e1;font-size:14px;line-height:1.45}
@media(max-width:700px){.grid{grid-template-columns:1fr}table{font-size:13px}}
</style>
</head>
<body>
<header><h1>Cash Game Calculator</h1></header>
<div class="wrap">

<div class="card">
<h2>RANDOM.ORG Import</h2>
<label>Verify Link</label>
<input id="verify" placeholder="https://giveaways.random.org/verify/xxxxx">
<button id="pullBtn" type="button">Pull Results From Verify Link</button>
<p id="status" class="notice">Paste the RANDOM.ORG verify link and tap the button.</p>
</div>

<div class="card">
<h2>Game Setup</h2>
<div class="grid">
<div><label>$ Per Win</label><input id="perwin" type="number" value="50"></div>
<div><label>Entry Fee</label><input id="entry" type="number" value="150"></div>
<div><label>Total Rounds</label><input id="rounds" type="number" value="27"></div>
</div>

<label>Imported Winners / Results</label>
<textarea id="winners" placeholder="Results will appear here after importing. You can also paste one winner per line manually."></textarea>
<button id="calcBtn" type="button">Calculate Results</button>
</div>

<div class="card">
<h2>Results</h2>
<table>
<thead><tr><th>Player</th><th>Wins</th><th>Gross</th><th>Entry</th><th>Net</th><th>Best Streak</th></tr></thead>
<tbody id="body"><tr><td colspan="6">No results yet</td></tr></tbody>
</table>
</div>

</div>

<script>
async function pullResults(){
  const url = document.getElementById("verify").value.trim();
  const status = document.getElementById("status");
  status.textContent = "Loading RANDOM.ORG verify page...";

  try{
    const res = await fetch("/api/verify?url=" + encodeURIComponent(url));
    const data = await res.json();

    if(!res.ok){
      status.textContent = data.error || "Could not import results.";
      return;
    }

    if(!data.winners || data.winners.length === 0){
      status.textContent = "The page loaded, but winners could not be detected automatically. Raw preview is shown below.";
      document.getElementById("winners").value = data.rawPreview || "";
      return;
    }

    document.getElementById("winners").value = data.winners.join("\\n");
    status.textContent = "Imported " + data.winners.length + " result line(s).";
    calculateResults();
  }catch(e){
    status.textContent = "Import failed. This needs to be hosted with the included Node server, not only GitHub Pages.";
  }
}

function calculateResults(){
  const per = Number(document.getElementById("perwin").value || 0);
  const entry = Number(document.getElementById("entry").value || 0);
  const names = (document.getElementById("winners").value || "")
    .split(/\\n+/)
    .map(x => x.trim().replace(/\\s+/g," "))
    .filter(Boolean);

  const data = {};
  let current = "";
  let streak = 0;

  names.forEach(name => {
    if(!data[name]) data[name] = {wins:0,best:0};
    data[name].wins++;
    if(name === current){ streak++; } else { current = name; streak = 1; }
    if(streak > data[name].best) data[name].best = streak;
  });

  const rows = Object.keys(data).map(name => [name,data[name]]).sort((a,b) => b[1].wins - a[1].wins);

  document.getElementById("body").innerHTML = rows.length ? rows.map(row => {
    const name = row[0], d = row[1], gross = d.wins * per, net = gross - entry;
    return `<tr>
      <td>${name}</td>
      <td>${d.wins}</td>
      <td>$${gross.toFixed(2)}</td>
      <td>$${entry.toFixed(2)}</td>
      <td class="${net >= 0 ? "good" : "bad"}">$${net.toFixed(2)}</td>
      <td>${d.best}</td>
    </tr>`;
  }).join("") : '<tr><td colspan="6">No results yet</td></tr>';
}

document.getElementById("pullBtn").addEventListener("click", pullResults);
document.getElementById("calcBtn").addEventListener("click", calculateResults);
</script>
</body>
</html>
